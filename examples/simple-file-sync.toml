# simple-file-sync 示例配置文件
# 客户端模式：all - 同步所有文件，git - 仅同步git差异文件
mode = "all"

# 本地目录，将被监控和同步
local_dir = "/Users/wudanyang/self/simple-file-sync"

# 当前激活的远程目标名称
active_target = "icoding-dev"

# 忽略模式 (全值匹配，正则表达式)
ignore = [
    ".*/\\.tmp$",
    ".*/\\.log$",
    ".*/node_modules$",
    ".*/build$",
    ".*/.git/.*",       # 匹配所有.git目录内的任何文件/目录
    ".*/\\.git",        # 匹配.git目录（不带末尾斜杠）
    ".*/\\.DS_Store$",
    ".*/__pycache__",
    ".*/.gitignore",
    ".*/.idea",
    ".*/.vscode",
    ".*/.github",
]

# 路径映射 (正则表达式:目标路径格式)
path_mappings = [
    "/src(/.*)\\.js$:/build$1.min.js",
    "/images(/.*):static/images$1",
]


# 远程目标配置
[[remote_targets]]
name = "example-prod"
server_addr = "http://10.25.78.81:8120/receiver"
remote_dir = "/home/users/wudanyang/wudanyang/example-simple-file-sync-prod"
token = "123456"

[[remote_targets]]
name = "example-dev"
server_addr = "http://10.25.78.81:8122/receiver"
remote_dir = "/home/users/wudanyang/wudanyang/example-simple-file-sync-dev"
token = "123456"
